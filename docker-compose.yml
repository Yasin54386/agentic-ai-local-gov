# Ask Territory — web stack.
#
#   docker compose up -d --build
#
# The app is a tiny stdlib Python + SQLite service. The chat is "AI Powered"
# by a hosted API: set ANTHROPIC_API_KEY in the environment (or a .env file)
# to enable it. Without a key the data panels, forms and how-to guides all
# still work — only the chat tab shows offline.

services:
  web:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MODEL=${MODEL:-claude-haiku-4-5}
      - MAX_OUTPUT_TOKENS=${MAX_OUTPUT_TOKENS:-500}
      # Hard spend ceiling (see agent/budget.py). Override per deployment.
      - BUDGET_MONTHLY_AUD=${BUDGET_MONTHLY_AUD:-100}
      - USD_PER_AUD=${USD_PER_AUD:-0.60}
      - AI_DAILY_CALLS=${AI_DAILY_CALLS:-450}
    volumes:
      - ./data:/app/data          # persist catalog/unified DBs + the AI usage ledger
    ports:
      - "127.0.0.1:8000:8000"     # bind to localhost only; nginx terminates TLS

  # OPTIONAL — the web app self-refreshes on access (live every 10 min,
  # datasets every 24h), so this scheduled job is only a belt-and-braces backup
  # for periods of zero traffic. Behind the "refresh" profile.
  refresh:
    build: .
    restart: unless-stopped
    profiles: ["refresh"]
    command: ["python", "-m", "ingestion.refresh", "--interval", "21600"]
    volumes:
      - ./data:/app/data
