# CI/CD — push to main → run tests → SSH deploy to Oracle Cloud VM
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   ORACLE_HOST        Public IP of your Oracle VM
#   ORACLE_USER        SSH username (usually: ubuntu)
#   ORACLE_SSH_KEY     Private SSH key (the .pem file contents, full text)
#   ORACLE_DEPLOY_DIR  Path on the VM, e.g. /opt/ask-territory

name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  # ── 1. Test ───────────────────────────────────────────────────────────────
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check — all Python files
        run: |
          python -m py_compile \
            webapp/server.py \
            agent/agent.py \
            agent/llm.py \
            agent/tools.py \
            agent/repository.py \
            db/connection.py \
            db/migrate.py \
            ingestion/forms_scraper.py \
            ingestion/forms_search.py \
            ingestion/howto_scraper.py \
            ingestion/howto_search.py \
            scripts/scrape_forms.py \
            scripts/scrape_howto.py
          echo "All files pass syntax check."

      - name: Run database migrations (smoke test)
        run: |
          python -m db.migrate
          echo "Migrations applied cleanly."

      - name: Verify forms table exists
        run: |
          python -c "
          import sqlite3
          db = sqlite3.connect('data/askterritory.db')
          tables = [r[0] for r in db.execute(\"SELECT name FROM sqlite_master WHERE type='table'\")]
          assert 'forms' in tables, 'forms table missing'
          assert 'howto_guides' in tables, 'howto_guides table missing'
          assert 'forms_fts' in tables, 'forms_fts missing'
          assert 'howto_fts' in tables, 'howto_fts missing'
          print('All expected tables present:', tables)
          "

      - name: Verify API routes registered
        run: |
          python -c "
          import ast, sys
          src = open('webapp/server.py').read()
          for route in ['/api/forms/search', '/api/howto/search', '/forms', '/howto']:
              assert route in src, f'Missing route: {route}'
          print('All routes found in server.py')
          "

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: test          # only deploy if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Oracle VM
        env:
          HOST: ${{ secrets.ORACLE_HOST }}
          USER: ${{ secrets.ORACLE_USER }}
          DIR:  ${{ secrets.ORACLE_DEPLOY_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$HOST" bash <<'REMOTE'
            set -e

            echo "==> Pulling latest code"
            cd "${{ env.DIR }}"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Running database migrations"
            python3 -m db.migrate

            echo "==> Rebuilding and restarting containers"
            sudo docker compose up -d --build --remove-orphans

            echo "==> Waiting for app to be healthy"
            for i in $(seq 1 12); do
              STATUS=$(curl -sf http://localhost:8000/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok','false'))" 2>/dev/null || echo "false")
              if [ "$STATUS" = "True" ] || [ "$STATUS" = "true" ]; then
                echo "App healthy after ${i}x5s wait."
                break
              fi
              echo "  waiting... ($i/12)"
              sleep 5
            done

            echo "==> Deploy complete on $(hostname) at $(date)"
          REMOTE

      - name: Smoke test public endpoint
        env:
          DOMAIN: ${{ secrets.ORACLE_HOST }}
        run: |
          # Hit the health API directly on the server's IP (bypasses Cloudflare cache)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://${{ secrets.ORACLE_HOST }}/api/health" \
            -H "Host: ${{ secrets.ORACLE_HOST }}" 2>/dev/null || echo "000")
          echo "Health endpoint HTTP status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "WARNING: health endpoint returned $HTTP — check docker logs on the VM"
            # Don't fail the job — Cloudflare proxy may block direct IP access
          fi
          echo "Deployment pipeline finished successfully."
