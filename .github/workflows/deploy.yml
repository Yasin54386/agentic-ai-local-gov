# CI/CD — push to main → run tests → SSH deploy to a DigitalOcean droplet
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DO_HOST        Public IP (or domain) of your DigitalOcean droplet
#   DO_USER        SSH username (root, or a sudo user e.g. deploy)
#   DO_SSH_KEY     Private SSH key authorised on the droplet (full text)
#   DO_DEPLOY_DIR  Path on the droplet, e.g. /opt/ask-territory
#
# First-time droplet setup is a one-off: see deploy/DIGITALOCEAN.md.

name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  # ── 1. Test ───────────────────────────────────────────────────────────────
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check — all Python files
        run: |
          python -m py_compile \
            webapp/server.py \
            agent/agent.py \
            agent/llm.py \
            agent/tools.py \
            agent/repository.py \
            db/connection.py \
            db/migrate.py \
            ingestion/forms_scraper.py \
            ingestion/forms_search.py \
            ingestion/howto_scraper.py \
            ingestion/howto_search.py \
            scripts/scrape_forms.py \
            scripts/scrape_howto.py
          echo "All files pass syntax check."

      - name: Run database migrations (smoke test)
        run: |
          python -m db.migrate
          echo "Migrations applied cleanly."

      - name: Verify tables and seed data
        run: |
          python -c "
          import sqlite3, sys
          db = sqlite3.connect('data/askterritory.db')
          tables = [r[0] for r in db.execute(\"SELECT name FROM sqlite_master WHERE type='table'\")]
          for t in ['forms','howto_guides','forms_fts','howto_fts']:
              assert t in tables, f'Missing table: {t}'
          forms_count = db.execute('SELECT COUNT(*) FROM forms').fetchone()[0]
          howto_count = db.execute('SELECT COUNT(*) FROM howto_guides').fetchone()[0]
          assert forms_count >= 20, f'Expected >=20 seed forms, got {forms_count}'
          assert howto_count >= 5,  f'Expected >=5 seed guides, got {howto_count}'
          print(f'OK: {forms_count} forms, {howto_count} how-to guides seeded')
          "

      - name: Verify search does not crash on edge-case queries
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from db.connection import Database
          from ingestion.forms_search import keyword_search as fkw
          from ingestion.howto_search import keyword_search as hkw
          db = Database().connect()
          for q in ['AND','OR','NOT','dog','ochre card','building permit','','   ']:
              fkw(db, q); hkw(db, q)
          db.close()
          print('All edge-case queries passed without exception')
          "

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Verify API routes registered
        run: |
          python -c "
          import ast, sys
          src = open('webapp/server.py').read()
          for route in ['/api/forms/search', '/api/howto/search', '/forms', '/howto']:
              assert route in src, f'Missing route: {route}'
          print('All routes found in server.py')
          "

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean droplet
    runs-on: ubuntu-latest
    needs: test          # only deploy if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy over SSH
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USER }}
          DIR:  ${{ secrets.DO_DEPLOY_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$HOST" \
            "DIR='$DIR' bash -s" <<'REMOTE'
            set -e
            cd "$DIR"

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Building the database (schema + seed + committed data)"
            python3 -m db.migrate
            python3 -m db.load || echo "  (db.load skipped/failed — seed data from migrations still present)"

            echo "==> Rebuilding and restarting the web container"
            # Default profile = web only. Use 'docker compose --profile model up'
            # once you move to a bigger droplet to also run Ollama + refresh.
            sudo docker compose up -d --build --remove-orphans

            echo "==> Waiting for the app to report healthy"
            for i in $(seq 1 12); do
              STATUS=$(curl -sf http://localhost:8000/api/health \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok','false'))" 2>/dev/null || echo "false")
              if [ "$STATUS" = "True" ] || [ "$STATUS" = "true" ]; then
                echo "App healthy after ${i}x5s."
                break
              fi
              echo "  waiting... ($i/12)"; sleep 5
            done

            echo "==> Deploy complete on $(hostname) at $(date)"
          REMOTE

      - name: Smoke test public endpoints
        run: |
          BASE="http://${{ secrets.DO_HOST }}"

          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE/api/health" 2>/dev/null || echo "000")
          echo "Health: $HTTP"

          FORMS=$(curl -sf "$BASE/api/forms/search?q=dog" 2>/dev/null || echo '{}')
          COUNT=$(echo "$FORMS" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('results',[])))" 2>/dev/null || echo "0")
          echo "Forms search 'dog': $COUNT results"
          [ "$COUNT" -lt 1 ] && echo "WARNING: forms search returned 0 results for 'dog'" || true

          HOWTO=$(curl -sf "$BASE/api/howto/search?q=licence" 2>/dev/null || echo '{}')
          COUNT=$(echo "$HOWTO" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('results',[])))" 2>/dev/null || echo "0")
          echo "Howto search 'licence': $COUNT results"
          [ "$COUNT" -lt 1 ] && echo "WARNING: howto search returned 0 results for 'licence'" || true

          echo "Deployment pipeline finished."
