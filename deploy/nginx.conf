# nginx reverse proxy for Ask Territory.
# Replace ask-territory.com.au with your real domain, copy to
#   /etc/nginx/sites-available/ask-territory  and symlink into sites-enabled,
# then run certbot to add HTTPS automatically (see DEPLOY.md).
#
# This file is included inside nginx's http{} block, so the limit_req_zone
# directive below is in the right context.

# Per-IP rate limit for the only token-spending endpoints. First line of the
# spend defence; the app enforces its own per-IP buckets and a hard monthly
# budget behind it (belt and braces).
limit_req_zone $binary_remote_addr zone=ask:10m rate=5r/m;

server {
    listen 80;
    server_name ask-territory.com.au www.ask-territory.com.au;

    # Sensible limits for a public civic service.
    client_max_body_size 1m;

    # AI chat endpoints — tight rate limit + tiny body (questions are short).
    location ~ ^/api/(ask|guide)$ {
        limit_req zone=ask burst=5 nodelay;
        limit_req_status 429;
        client_max_body_size 16k;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# After `certbot --nginx -d ask-territory.com.au -d www.ask-territory.com.au`,
# certbot rewrites this file to add the TLS (443) server block and an
# HTTP->HTTPS redirect automatically. No manual TLS editing needed.
