# nginx reverse proxy for Ask Territory.
# Replace ask-territory.com.au with your real domain, copy to
#   /etc/nginx/sites-available/ask-territory  and symlink into sites-enabled,
# then run certbot to add HTTPS automatically (see DEPLOY.md).

server {
    listen 80;
    server_name ask-territory.com.au www.ask-territory.com.au;

    # Sensible limits for a public civic service.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The "Ask" endpoint can take a while on CPU-only model hosts.
        proxy_read_timeout 300s;
    }
}

# After `certbot --nginx -d ask-territory.com.au -d www.ask-territory.com.au`,
# certbot rewrites this file to add the TLS (443) server block and an
# HTTP->HTTPS redirect automatically. No manual TLS editing needed.
