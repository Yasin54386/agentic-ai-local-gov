<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e8a020">
<title>NT Tour Guide — AskTerritory.com</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;
  --accent:#f97316;--accent2:#3b82f6;--accent3:#8b5cf6;
  --green:#22c55e;--text:#e2e8f0;--muted:#8892a0;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:20px;font-weight:700;color:var(--accent)}
.logo span{color:var(--text)}
.badge{background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:8px}
.nav{display:flex;gap:16px;margin-left:auto}
.nav a{color:var(--muted);text-decoration:none;font-size:13px}
.nav a:hover{color:var(--text)}

/* hero */
.hero{text-align:center;padding:44px 24px 24px}
.hero h1{font-size:clamp(22px,4vw,34px);font-weight:800;margin-bottom:8px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--muted);font-size:15px;max-width:560px;margin:0 auto;line-height:1.6}

/* search */
.search-wrap{max-width:800px;margin:0 auto;padding:0 16px 16px}
.search-row{display:flex;gap:8px;margin-bottom:14px}
#searchInput{flex:1;background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-size:16px;padding:13px 18px;border-radius:var(--radius);outline:none;transition:border-color .15s}
#searchInput:focus{border-color:var(--accent)}
#searchInput::placeholder{color:var(--muted)}
.btn-search{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-search:hover{opacity:.85}

/* category chips */
.cat-scroll{max-width:800px;margin:0 auto;padding:0 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cat-row{display:flex;gap:6px;flex-wrap:nowrap;white-space:nowrap}
.cat-chip{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:99px;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.cat-chip:hover,.cat-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(249,115,22,.08)}

/* stats bar */
.stats-bar{max-width:800px;margin:0 auto;padding:0 16px 12px;display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--muted)}
.stat-pill strong{color:var(--accent)}

/* grid */
#results{max-width:800px;margin:0 auto;padding:0 16px 60px}
.result-meta{font-size:13px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.result-meta strong{color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .12s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-img{width:100%;height:140px;background:linear-gradient(135deg,#1e2535,#2a3042);display:flex;align-items:center;justify-content:center;font-size:48px}
.card-body{padding:13px 14px 12px}
.card-cat{display:inline-flex;align-items:center;gap:4px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);color:var(--accent);font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card-region{font-size:11px;color:var(--muted);margin-bottom:6px}
.card-summary{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-rating{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px}
.stars{color:#f59e0b;letter-spacing:1px;font-size:13px}
.stars-empty{color:var(--border)}
.review-count{color:var(--muted)}

/* loading */
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:60px}
.empty-state{text-align:center;padding:60px 0;color:var(--muted)}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text)}

/* pagination */
.pagination{display:flex;gap:6px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.pg-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .12s}
.pg-btn:hover:not(:disabled){color:var(--text);border-color:var(--accent)}
.pg-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.pg-btn:disabled{opacity:.4;cursor:default}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;margin:auto;overflow:hidden}
.modal-hero{background:linear-gradient(135deg,#1e2535,#2a3042);padding:40px 24px 24px;text-align:center;position:relative}
.modal-emoji{font-size:56px;margin-bottom:10px}
.modal-title{font-size:22px;font-weight:800;margin-bottom:4px}
.modal-region{font-size:13px;color:var(--muted)}
.modal-cat-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--accent);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-top:8px;text-transform:uppercase}
.close-btn{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:rgba(255,255,255,.2)}
.modal-content{padding:20px 24px}
.modal-rating-bar{display:flex;align-items:center;gap:12px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:var(--radius);padding:12px 16px;margin-bottom:18px}
.big-stars{font-size:22px;color:#f59e0b;letter-spacing:2px}
.avg-num{font-size:26px;font-weight:800;color:#f59e0b}
.rev-count-lg{font-size:13px;color:var(--muted)}
.section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.description{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:18px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.info-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.info-key{font-size:11px;color:var(--muted);margin-bottom:3px}
.info-val{font-size:13px;color:var(--text);font-weight:500}
.tips-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#93c5fd;line-height:1.6}
.tips-box strong{color:#60a5fa}
.action-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.btn-action{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;border:none;transition:opacity .15s}
.btn-action:hover{opacity:.85}
.btn-website{background:var(--accent);color:#000}
.btn-maps{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd}

/* reviews section */
.reviews-section{border-top:1px solid var(--border);padding-top:18px;margin-top:4px}
.review-form-toggle{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);color:var(--accent);font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;width:100%;margin-bottom:14px;transition:background .15s}
.review-form-toggle:hover{background:rgba(249,115,22,.18)}
.review-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:none}
.review-form.open{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
.form-field input,.form-field textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.form-field input:focus,.form-field textarea:focus{border-color:var(--accent)}
.form-field textarea{resize:vertical;min-height:80px}
.star-picker{display:flex;gap:6px;margin-top:4px}
.star-pick{font-size:24px;cursor:pointer;color:var(--border);transition:color .1s;line-height:1}
.star-pick.on{color:#f59e0b}
.submit-review-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;transition:opacity .15s}
.submit-review-btn:hover{opacity:.85}
.submit-review-btn:disabled{opacity:.4;cursor:default}

/* review list */
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.reviewer-name{font-weight:600;font-size:13px}
.review-stars{color:#f59e0b;font-size:13px}
.review-date{font-size:11px;color:var(--muted)}
.review-text{font-size:13px;color:var(--muted);line-height:1.55}
.load-more-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;margin-top:10px}
.load-more-btn:hover{color:var(--text);border-color:var(--accent)}
.no-reviews{color:var(--muted);font-size:13px;padding:8px 0}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--accent);color:var(--accent);padding:10px 22px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:520px){
  .search-row{flex-direction:column}
  .btn-search{width:100%}
  .info-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .modal-content{padding:16px}
}
@media print{
  header,.search-wrap,.cat-scroll,.stats-bar,.pagination,.toast{display:none!important}
  .card{page-break-inside:avoid}
}
</style>
</head>
<body>
<div id="nav-root"></div>
<script src="/nav.js"></script>

<div class="hero">
  <h1>Explore the <span>Northern Territory</span></h1>
  <p>Discover 70+ destinations — beaches, waterfalls, gorges, national parks, markets, wildlife and more. Real traveller reviews, tips and official links.</p>
</div>

<div class="search-wrap">
  <div class="search-row">
    <input id="searchInput" type="search" placeholder="Search destinations — e.g. waterfall, gorge, sunset market, barramundi…" autocomplete="off" autofocus>
    <button class="btn-search" onclick="doSearch(1)">Search</button>
  </div>
</div>

<div class="cat-scroll" id="catScroll">
  <div class="cat-row" id="catRow">
    <span class="cat-chip active" data-cat="" onclick="selectCat(this,'')">🗺 All</span>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div id="results">
  <div class="loading-wrap"><div class="spinner"></div></div>
</div>

<!-- Destination modal -->
<div id="destModal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner">
    <div class="modal-hero" id="modalHero">
      <button class="close-btn" onclick="closeModal()">✕</button>
      <div class="modal-emoji" id="modalEmoji"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-region" id="modalRegion"></div>
      <div class="modal-cat-badge" id="modalCat"></div>
    </div>
    <div class="modal-content">
      <div class="modal-rating-bar" id="modalRatingBar" style="display:none">
        <div class="avg-num" id="modalAvgNum"></div>
        <div>
          <div class="big-stars" id="modalBigStars"></div>
          <div class="rev-count-lg" id="modalRevCount"></div>
        </div>
      </div>
      <div class="section-label">About</div>
      <div class="description" id="modalDesc"></div>
      <div class="section-label">Details</div>
      <div class="info-grid" id="modalInfoGrid"></div>
      <div class="tips-box" id="modalTips" style="display:none"></div>
      <div class="action-btns" id="modalActions"></div>
      <!-- Reviews -->
      <div class="reviews-section">
        <div class="section-label">Reviews</div>
        <button class="review-form-toggle" onclick="toggleReviewForm()">✏️ Write a review</button>
        <div class="review-form" id="reviewForm">
          <div class="form-row">
            <div class="form-field">
              <label>Your name (optional)</label>
              <input id="rvName" placeholder="Anonymous">
            </div>
            <div class="form-field">
              <label>Rating</label>
              <div class="star-picker" id="starPicker">
                <span class="star-pick" data-v="1" onclick="setStar(1)">★</span>
                <span class="star-pick" data-v="2" onclick="setStar(2)">★</span>
                <span class="star-pick" data-v="3" onclick="setStar(3)">★</span>
                <span class="star-pick" data-v="4" onclick="setStar(4)">★</span>
                <span class="star-pick" data-v="5" onclick="setStar(5)">★</span>
              </div>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-field">
              <label>Your experience</label>
              <textarea id="rvText" placeholder="What was it like? Any tips for other visitors?"></textarea>
            </div>
          </div>
          <button class="submit-review-btn" id="submitRevBtn" onclick="submitReview()">Submit Review</button>
        </div>
        <div id="reviewList"></div>
        <button class="load-more-btn" id="loadMoreBtn" style="display:none" onclick="loadMoreReviews()">Load more reviews</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// PWA
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

const resultsEl  = document.getElementById('results');
const statsBar   = document.getElementById('statsBar');

let currentCat   = '';
let currentQuery = '';
let currentPage  = 1;
let totalPages   = 1;
let openDestId   = null;
let reviewPage   = 1;
let reviewTotal  = 0;
let pickedStar   = 0;

// ── Init ─────────────────────────────────────────────────────────────────────
loadStats();
doSearch(1);

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(1);
});

// ── Stats & categories ───────────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await (await fetch('/api/tour/stats')).json();
    if (!d.total) return;

    statsBar.innerHTML =
      `<span class="stat-pill"><strong>${d.total.toLocaleString()}</strong> destinations</span>` +
      (d.by_category || []).slice(0, 6).map(c =>
        `<span class="stat-pill">${esc(c.category.replace('_',' '))} <strong>${c.count}</strong></span>`
      ).join('');

    const row = document.getElementById('catRow');
    (d.categories || []).forEach(([key, label, emoji]) => {
      const sp = document.createElement('span');
      sp.className = 'cat-chip';
      sp.dataset.cat = key;
      sp.textContent = `${emoji} ${label}`;
      sp.onclick = () => selectCat(sp, key);
      row.appendChild(sp);
    });
  } catch(e) {}
}

function selectCat(el, cat) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  doSearch(1);
}

// ── Search ───────────────────────────────────────────────────────────────────
async function doSearch(page) {
  currentPage  = page;
  currentQuery = document.getElementById('searchInput').value.trim();
  resultsEl.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const params = new URLSearchParams({
      q: currentQuery, category: currentCat, page, limit: 12,
    });
    const d = await (await fetch(`/api/tour/search?${params}`)).json();
    totalPages = d.pages || 1;
    renderResults(d);
  } catch(e) {
    resultsEl.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${esc(e.message)}</p></div>`;
  }
}

function renderResults(d) {
  const results = d.results || [];
  if (!results.length) {
    resultsEl.innerHTML = `
      <div class="empty-state">
        <h3>No destinations found</h3>
        <p>Try a different search term or browse all destinations by clearing the search.</p>
      </div>`;
    return;
  }
  const label = currentQuery
    ? `<strong>${d.total}</strong> result${d.total!==1?'s':''} for "<strong>${esc(currentQuery)}</strong>"`
    : `<strong>${d.total}</strong> destinations`;
  const catLabel = currentCat ? ` in <strong>${esc(currentCat.replace('_',' '))}</strong>` : '';

  const cards = results.map(r => {
    const stars = renderStars(r.avg_rating);
    const ratingHtml = r.review_count
      ? `<div class="card-rating">${stars}<span class="review-count">${r.avg_rating} (${r.review_count})</span></div>`
      : `<div class="card-rating" style="color:var(--muted);font-size:12px">No reviews yet</div>`;
    return `
      <div class="card" onclick="openDest(${r.id})">
        <div class="card-img">${r.category_emoji || '📍'}</div>
        <div class="card-body">
          <div class="card-cat">${esc(r.category_emoji||'')} ${esc(r.category_label)}</div>
          <div class="card-title">${esc(r.name)}</div>
          <div class="card-region">📍 ${esc(r.region)}</div>
          <div class="card-summary">${esc(r.summary)}</div>
          ${ratingHtml}
        </div>
      </div>`;
  }).join('');

  resultsEl.innerHTML = `
    <div class="result-meta">
      <span>${label}${catLabel}</span>
      <span style="font-size:12px;color:var(--muted)">Page ${currentPage} of ${totalPages}</span>
    </div>
    <div class="grid">${cards}</div>
    ${renderPagination(currentPage, totalPages)}`;
}

function renderPagination(page, total) {
  if (total <= 1) return '';
  const btns = [];
  btns.push(`<button class="pg-btn" onclick="doSearch(${page-1})" ${page===1?'disabled':''}>← Prev</button>`);
  for (let p = Math.max(1, page-2); p <= Math.min(total, page+2); p++) {
    btns.push(`<button class="pg-btn${p===page?' active':''}" onclick="doSearch(${p})">${p}</button>`);
  }
  btns.push(`<button class="pg-btn" onclick="doSearch(${page+1})" ${page===total?'disabled':''}>Next →</button>`);
  return `<div class="pagination">${btns.join('')}</div>`;
}

// ── Destination modal ────────────────────────────────────────────────────────
async function openDest(id) {
  openDestId = id;
  pickedStar = 0;
  reviewPage = 1;
  document.getElementById('reviewForm').classList.remove('open');
  document.getElementById('rvName').value = '';
  document.getElementById('rvText').value = '';
  setStar(0);

  document.getElementById('destModal').style.display = 'flex';
  document.getElementById('modalInner').scrollTop = 0;
  document.getElementById('reviewList').innerHTML = '<div class="loading-wrap" style="padding:20px"><div class="spinner"></div></div>';

  try {
    const d = await (await fetch(`/api/tour/destination/${id}`)).json();
    if (d.error) { closeModal(); showToast(d.error); return; }

    document.getElementById('modalEmoji').textContent  = d.category_emoji || '📍';
    document.getElementById('modalTitle').textContent  = d.name;
    document.getElementById('modalRegion').textContent = `📍 ${d.region}`;
    document.getElementById('modalCat').textContent    = `${d.category_emoji||''} ${d.category_label}`;
    document.getElementById('modalDesc').textContent   = d.description || d.summary;

    // Rating bar
    if (d.review_count > 0) {
      document.getElementById('modalRatingBar').style.display = 'flex';
      document.getElementById('modalAvgNum').textContent = d.avg_rating;
      document.getElementById('modalBigStars').innerHTML = renderStars(d.avg_rating);
      document.getElementById('modalRevCount').textContent = `${d.review_count} review${d.review_count!==1?'s':''}`;
    } else {
      document.getElementById('modalRatingBar').style.display = 'none';
    }

    // Info grid
    const infoItems = [
      ['📍 Address', d.address],
      ['⏰ Hours', d.hours],
      ['💰 Price', d.price],
      ['📞 Phone', d.phone],
    ].filter(([,v]) => v);
    document.getElementById('modalInfoGrid').innerHTML = infoItems.map(([k,v]) =>
      `<div class="info-item"><div class="info-key">${esc(k)}</div><div class="info-val">${esc(v)}</div></div>`
    ).join('');

    // Tips
    if (d.tips) {
      document.getElementById('modalTips').style.display = 'block';
      document.getElementById('modalTips').innerHTML = `<strong>💡 Tips:</strong> ${esc(d.tips)}`;
    } else {
      document.getElementById('modalTips').style.display = 'none';
    }

    // Action buttons
    let btns = '';
    if (d.website) {
      btns += `<a class="btn-action btn-website" href="${escA(d.website)}" target="_blank" rel="noopener">🔗 Official Website</a>`;
    }
    if (d.maps_url) {
      btns += `<a class="btn-action btn-maps" href="${escA(d.maps_url)}" target="_blank" rel="noopener">🗺 Get Directions</a>`;
    }
    document.getElementById('modalActions').innerHTML = btns;

    // Load reviews
    reviewTotal = d.review_count || 0;
    await loadReviews(1, true);
  } catch(e) {
    showToast('Failed to load: ' + e.message);
  }
}

function closeModal() {
  document.getElementById('destModal').style.display = 'none';
  openDestId = null;
}

// ── Reviews ──────────────────────────────────────────────────────────────────
async function loadReviews(page, replace) {
  const el = document.getElementById('reviewList');
  const lm = document.getElementById('loadMoreBtn');
  if (replace) el.innerHTML = '';

  try {
    const d = await (await fetch(`/api/tour/reviews/${openDestId}?page=${page}&limit=3`)).json();
    const reviews = d.reviews || [];

    if (!reviews.length && replace) {
      el.innerHTML = '<div class="no-reviews">No reviews yet — be the first to share your experience!</div>';
      lm.style.display = 'none';
      return;
    }

    reviews.forEach(r => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `
        <div class="review-header">
          <div>
            <span class="reviewer-name">${esc(r.reviewer_name)}</span>
            <span class="review-stars"> ${renderStarsFull(r.rating)}</span>
          </div>
          <div class="review-date">${esc(r.created_at.slice(0,10))}</div>
        </div>
        <div class="review-text">${esc(r.review_text)}</div>`;
      el.appendChild(div);
    });

    reviewPage = page;
    const hasMore = page < (d.pages || 1);
    lm.style.display = hasMore ? 'block' : 'none';
  } catch(e) {
    if (replace) el.innerHTML = '<div class="no-reviews">Could not load reviews.</div>';
  }
}

function loadMoreReviews() {
  loadReviews(reviewPage + 1, false);
}

function toggleReviewForm() {
  document.getElementById('reviewForm').classList.toggle('open');
}

function setStar(n) {
  pickedStar = n;
  document.querySelectorAll('.star-pick').forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.v) <= n);
  });
}

async function submitReview() {
  if (!openDestId) return;
  if (!pickedStar) { showToast('Please pick a star rating'); return; }
  const text = document.getElementById('rvText').value.trim();
  if (!text) { showToast('Please write something about your experience'); return; }
  const name = document.getElementById('rvName').value.trim() || 'Anonymous';

  const btn = document.getElementById('submitRevBtn');
  btn.disabled = true;
  try {
    const res = await fetch('/api/tour/review', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({destination_id: openDestId, name, rating: pickedStar, text}),
    });
    const d = await res.json();
    if (d.ok) {
      showToast('Review submitted — thank you!');
      document.getElementById('reviewForm').classList.remove('open');
      document.getElementById('rvName').value = '';
      document.getElementById('rvText').value = '';
      setStar(0);
      reviewPage = 1;
      await loadReviews(1, true);
      // Refresh card rating in background
    } else {
      showToast(d.error || 'Failed to submit');
    }
  } catch(e) {
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function renderStars(avg) {
  if (avg == null) return '<span class="stars-empty">☆☆☆☆☆</span>';
  const full = Math.round(avg);
  return '<span class="stars">' + '★'.repeat(full) + '</span>' +
         '<span class="stars-empty">' + '☆'.repeat(5 - full) + '</span>';
}
function renderStarsFull(n) {
  return '<span class="stars">' + '★'.repeat(n) + '</span>' +
         '<span class="stars-empty">' + '☆'.repeat(5 - n) + '</span>';
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escA(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
